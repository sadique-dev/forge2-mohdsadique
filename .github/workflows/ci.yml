name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions: write-all

jobs:
  backend:
    name: Laravel Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3, pdo_mysql, xml, bcmath, ctype, json, tokenizer
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer update --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

      - name: Copy .env
        working-directory: backend
        run: cp .env.ci .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run migrations & seed
        working-directory: backend
        run: php artisan migrate --seed --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Run tests (Pest)
        working-directory: backend
        run: |
          ./vendor/bin/pest --ci > test-results.txt 2>&1 || (
            git config --global user.email "ci@pulsedesk.local"
            git config --global user.name "CI Runner"
            git add test-results.txt
            git commit -m "ci: dump test failure log [skip ci]"
            git push
            exit 1
          )
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (lint + type-check included)
        working-directory: frontend
        run: npm run build
